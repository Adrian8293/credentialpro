<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family:Segoe UI,system-ui,sans-serif;background:#f8fafc;padding:40px">
  <div style="max-width:420px;margin:0 auto;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px">
    <h1 style="margin-bottom:8px;font-size:22px">Set your password</h1>
    <p style="margin-bottom:16px;color:#64748b">Enter your new password below.</p>

    <div id="msg" style="margin-bottom:12px;color:#b91c1c"></div>

    <input id="pw1" type="password" placeholder="New password" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #cbd5e1;border-radius:8px" />
    <input id="pw2" type="password" placeholder="Confirm password" style="width:100%;padding:10px;margin-bottom:12px;border:1px solid #cbd5e1;border-radius:8px" />
    <button onclick="setPassword()" style="width:100%;padding:10px;background:#2563a8;color:white;border:none;border-radius:8px">Save password</button>
  </div>

  <script>
    const SUPABASE_URL  = 'https://ksheufsoteoswhlbxkif.supabase.co';
    const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY_HERE';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    async function setPassword(){
      const msg = document.getElementById('msg');
      const pw1 = document.getElementById('pw1').value;
      const pw2 = document.getElementById('pw2').value;
      msg.textContent = '';
      msg.style.color = '#b91c1c';

      if (!pw1 || pw1.length < 8) {
        msg.textContent = 'Password must be at least 8 characters.';
        return;
      }

      if (pw1 !== pw2) {
        msg.textContent = 'Passwords do not match.';
        return;
      }

      const { error } = await sb.auth.updateUser({ password: pw1 });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      msg.style.color = '#166534';
      msg.textContent = 'Password saved. Redirecting to sign in...';

      setTimeout(() => {
        window.location.href = '/';
      }, 1200);
    }
  </script>
</body>
</html>
